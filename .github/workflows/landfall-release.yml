name: Synthesize Release Notes

on:
  release:
    types: [published]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  synthesize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: misty-step/landfall@v1
        with:
          mode: synthesis-only
          healthcheck: "true"
          release-tag: ${{ github.event.release.tag_name }}
          github-token: ${{ secrets.GH_RELEASE_TOKEN }}
          llm-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          product-description: Release notes and changelog automation for phrazzld/brainstorm-press-express-api.
          audience: developer
          voice-guide: clear, concrete, and specific to shipped behavior
          changelog-source: auto
          notes-output-file: docs/releases/{version}.md
          notes-output-json: docs/releases/releases.json
